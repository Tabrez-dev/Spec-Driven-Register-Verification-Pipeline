name: register-validation

on:
  pull_request:
    paths:
      - 'svd/**'

# Chip-agnostic: the pipeline only ever sees --svd <path>.
env:
  SVD: svd/TM4C123GH6PM.svd
  TARGET: thumbv7em-none-eabihf
  # keelhaul is not published on crates.io (its CLI has a path dependency), so
  # it is installed from git. Pinned: codegen output is an input to the compile
  # gate, and an unpinned tool makes a green gate unreproducible.
  KEELHAUL_REV: 9296b1878c64f656b67bd90a21bf186ddac513e0

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Step 1 — check out the PR, with full history so we can read the old spec.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2 — install the Rust toolchain plus the embedded ARM target.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      # Step 3 — install the test generator (pinned commit).
      - name: Install keelhaul
        run: |
          cargo install --git https://github.com/soc-hub-fi/keelhaul \
            --rev "$KEELHAUL_REV" keelhaul-cli

      # Step 4 — inspect the spec before and after the change, and save the diff.
      # (--svd requires --arch on every subcommand, not only gen-regtest.)
      - name: Introspect
        run: |
          set -euo pipefail

          # Step 4a — one helper that runs the three read-only commands on a spec
          # and writes the facts to a file. $1 = spec path, $2 = output file.
          introspect() {
            # Step 4b — if the spec doesn't exist at this revision (a PR that
            # *adds* an SVD has no old version), write a placeholder and skip.
            if [ ! -s "$1" ]; then echo "(no SVD at this revision)" > "$2"; return; fi
            {
              echo "== ls-top =="             ; keelhaul ls-top            --svd "$1" --arch 32
              echo "== count-registers =="    ; keelhaul count-registers   --svd "$1" --arch 32
              echo "== count-reset-values ==" ; keelhaul count-reset-values --svd "$1" --arch 32
            } > "$2"
          }

          # Step 4c — grab the OLD spec from the base branch (empty if it's new).
          git show "origin/${{ github.base_ref }}:$SVD" > base.svd 2>/dev/null || : > base.svd

          # Step 4d — introspect old spec, then new spec.
          introspect base.svd introspect-base.txt
          introspect "$SVD"  introspect-head.txt

          # Step 4e — the actual changed lines, capped at 40KB so a pathological
          # diff can't blow up the LLM input. Raise the cap if real spec changes
          # ever get truncated.
          git diff -U3 "origin/${{ github.base_ref }}" -- "$SVD" | head -c 40000 > svd.diff

      # Step 5 — regenerate the test suite from the new spec and make it compile.
      # --on-fail panic, not error: with --on-fail error the generated Error enum
      # types read_val/reset_val as u32 while the test bodies cast to u64, so the
      # suite does not compile. That is a keelhaul codegen bug, not ours. Switch
      # to `error` once upstream fixes it -- the execution phase wants the Result
      # path so a UART harness can report per-test failures.
      # --test reset also requires --test read; reset alone panics the CLI.
      - name: Generate
        run: |
          set -euo pipefail
          keelhaul gen-regtest --svd "$SVD" --arch 32 \
            --test read --test reset --on-fail panic \
            > generated.rs
          python3 scripts/fixup_generated.py < generated.rs > testcrate/src/lib.rs 2> dropped.txt
          echo "dropped $(cat dropped.txt) duplicate register definitions"

      # Step 6 — the pass criterion: the regenerated suite must build for the ARM
      # target. If it doesn't, the spec change broke the tests and the PR goes red.
      - name: Compile gate
        working-directory: testcrate
        run: cargo build --target "$TARGET"

      # Step 7 — install the AI CLI only when its token is configured. Without it,
      # the summary falls back to the deterministic facts table (the script's own
      # guard handles a missing binary), so a PR without secrets still runs green.
      - name: Set up LLM (optional)
        if: env.LLM_CLI_TOKEN != ''
        env:
          LLM_CLI_TOKEN: ${{ secrets.LLM_CLI_TOKEN }}
        run: |
          [ -n "$LLM_CLI_TOKEN" ] && curl -fsSL https://claude.ai/install.sh | bash

      # Step 8 — build the impact summary (deterministic facts + optional AI prose)
      # from the diff and the two introspection files.
      - name: Impact summary
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.LLM_CLI_TOKEN }}
        run: |
          python3 scripts/impact_summary.py \
            --diff svd.diff --base introspect-base.txt --head introspect-head.txt \
            --out summary.md

      # Step 9 — post it all as one PR comment, editing the previous one in place.
      - name: PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "## Register validation — \`$SVD\`"
            echo
            cat summary.md
            echo
            echo "<details><summary>Introspection (head)</summary>"
            echo
            echo '```'; cat introspect-head.txt; echo '```'
            echo
            echo "</details>"
            echo
            echo "Generated suite compiled for \`$TARGET\`. ✅"
            echo "Dropped \`$(cat dropped.txt)\` duplicate register definitions"
            echo "(same address defined twice in the SVD; bodies were identical)."
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file comment.md --edit-last --create-if-none
